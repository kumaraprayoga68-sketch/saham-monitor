name: Listener Telegram

on:
  # Jadwal cron DINONAKTIFKAN — listener sekarang jalan nyala-terus di host cloud
  # (listener_loop.py di Render). Cron ini cuma bentrok/rebutan pesan kalau diaktifin.
  # Tetap bisa dijalanin manual sebagai cadangan kalau host cloud mati.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: listener-telegram
  cancel-in-progress: false

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependency
        run: pip install -r requirements.txt

      - name: Proses pesan masuk
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python listener.py

      - name: Simpan perubahan (offset/config/universe) kalau ada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Commit balik apa pun yang diubah command Telegram: offset, config, universe
          git add tg_offset.json config.json universe/ 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: update dari command Telegram [skip ci]"
            git pull --rebase --autostash origin main
            git push
          else
            echo "Tidak ada perubahan, tidak commit."
          fi
