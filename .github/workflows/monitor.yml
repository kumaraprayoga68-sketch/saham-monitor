name: Pemantau Saham

on:
  # Jadwal cron DINONAKTIFKAN — monitor watchlist sekarang dijalanin worker cloud
  # (listener_loop.py di Render, tiap interval_minutes). Cron ini bikin notif dobel
  # kalau diaktifin. Tetap bisa dijalanin manual sebagai cadangan.
  workflow_dispatch: {}

# Perlu write biar bisa commit balik state.json (anti-spam antar run)
permissions:
  contents: write

# Cegah dua run numpuk barengan
concurrency:
  group: pemantau-saham
  cancel-in-progress: false

jobs:
  cek:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependency
        run: pip install -r requirements.txt

      - name: Jalankan bot (sekali)
        env:
          RUN_ONCE: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Simpan state (commit balik kalau berubah)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain state.json)" ]; then
            git add state.json
            git commit -m "chore: update state alert [skip ci]"
            git pull --rebase --autostash origin main
            git push
          else
            echo "State tidak berubah, tidak commit."
          fi
